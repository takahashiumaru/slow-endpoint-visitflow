<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard Slow Endpoints</title>
  <style>
    :root{
      --bg:#0f1724;
      --bg-image: linear-gradient(180deg,#071021 0%, #071827 60%);
      --card:#0b1220;
      --muted:#9aa4b2;
      --accent:#7c5cff;
      --danger:#ff6b6b;
      --danger-tint: rgba(255,107,107,0.06);
      --danger-tint-light: rgba(255,107,107,0.02);
      --glass: rgba(255,255,255,0.03);
      --glass-2: rgba(255,255,255,0.02);
      --text:#e6eef6;
      --code:#cde8ff;
    }

    /* Light theme overrides */
    [data-theme="light"] {
      --bg: #ffffff; /* light background */
      --bg-image: none; /* no dark gradient in light mode */
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #5b21b6;
      --danger: #ef4444;
      --glass: rgba(2,6,23,0.02);
      --glass-2: rgba(2,6,23,0.01);
      --text: #0b1220;
      --code: #0b3b72;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      margin:0;
      background-color: var(--bg);
      background-image: var(--bg-image);
      background-repeat: no-repeat;
      background-size: cover;
      color:var(--text);
      padding:24px;
      transition: background .25s ease, color .2s ease;
    }

    header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:18px}
    .title{
      display:flex;gap:12px;align-items:baseline;
    }
    h1{font-size:20px;margin:0}
    .subtitle{color:var(--muted);font-size:13px}

    .controls{display:flex;gap:8px;align-items:center}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      background-color: var(--card);
      border-radius:12px;padding:12px;box-shadow:0 6px 18px rgba(2,6,23,0.06);backdrop-filter: blur(6px);
      border:1px solid rgba(0,0,0,0.06);
      transition: background-color .2s ease, color .2s ease;
    }

    input[type="search"], input[type="number"], select{
      background:transparent;border:1px solid rgba(0,0,0,0.06); color:var(--muted);
      padding:8px 10px;border-radius:8px;min-width:160px;
    }
    /* nicer single date input */
    .date-input{
      background:transparent;
      border:1px solid rgba(0,0,0,0.06);
      color:var(--muted);
      padding:8px 10px;
      border-radius:8px;
      height:36px;
      -webkit-appearance: none;
      appearance: none;
    }
    button{
      background:var(--accent); color:white;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;
      font-weight:600;box-shadow:0 6px 12px rgba(124,92,255,0.12);
      transition:opacity .12s ease, transform .08s ease;
    }
    button.ghost{
      background:transparent;border:1px solid rgba(0,0,0,0.06);color:var(--muted);box-shadow:none;
    }

    main{display:flex;gap:16px}
    .left{flex:1}
    .table-wrap{margin-top:12px;overflow:auto;border-radius:12px}
    table{width:100%;border-collapse:collapse;min-width:900px}
    thead th{position:sticky;top:0;background:linear-gradient(180deg, rgba(11,16,32,0.12), rgba(11,16,32,0.06));padding:12px 14px;text-align:left;font-size:13px;color:var(--muted);border-bottom:1px solid rgba(0,0,0,0.04)}
    tbody tr{border-bottom:1px solid rgba(255,255,255,0.02);transition:background .12s}
    tbody tr:hover{background:var(--glass)}
    td{padding:12px;font-size:13px;color:var(--text);vertical-align:middle}
    .muted{color:var(--muted);font-size:12px}
    .method-badge{
      display:inline-block;padding:6px 8px;border-radius:999px;font-weight:700;font-size:12px;color:#071021;
    }
    .m-GET{background:#a7f3d0;color:#064e3b}
    .m-POST{background:#bfdbfe;color:#0b3b72}
    .m-PUT{background:#fde68a;color:#3c2c00}
    .m-DELETE{background:#fecaca;color:#4c0202}
    .status-chip{padding:6px 8px;border-radius:8px;font-weight:600;font-size:12px}
    .s-2xx{background:rgba(34,197,94,0.12);color:#86efac}
    .s-4xx{background:rgba(250,204,21,0.08);color:#fef08a}
    .s-5xx{background:rgba(248,113,113,0.08);color:#fda4a4}

    .duration-bar{
      height:8px;background:var(--glass-2);border-radius:999px;overflow:hidden;width:160px;display:inline-block;vertical-align:middle;margin-left:8px;
    }
    .duration-fill{height:100%;background:linear-gradient(90deg,#ff9a8b,#ff6b6b);border-radius:999px;width:0%}

    /* duration emphasis */
    .duration-value{display:inline-block;margin-left:8px;color:var(--muted);font-weight:600}
    .duration-high{color:var(--danger);background:rgba(255,107,107,0.06);padding:4px 8px;border-radius:8px}
    .duration-fill.high{box-shadow:0 6px 14px rgba(255,107,107,0.10);transform:translateZ(0)}

    .token{font-family:monospace;color:var(--muted);max-width:320px;display:inline-block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:inline-flex;gap:8px;align-items:center}
    .pill{background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:999px;font-size:12px;color:var(--muted)}

    /* details row */
    tr.expanded + tr.details{display:table-row;background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01))}
    tr.details td{padding:14px 18px;color:var(--muted);font-size:13px}
    pre{white-space:pre-wrap;margin:0;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono",monospace;font-size:13px;color:var(--code)}
    /* use variable-driven color for code/path so light theme remains readable */
    .path-code, code { color: var(--code); }

    /* ADDED: nicer/responsive details layout and scrolling to avoid breaking table */
    .details-content{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      align-items:flex-start;
      overflow:auto;
    }
    .details-col{
      flex:1;
      min-width:0; /* allow shrinking in table cell */
      max-width:48%;
      box-sizing:border-box;
    }
    .details-side{
      min-width:180px;
      width:220px;
      box-sizing:border-box;
    }
    .details-pre{
      background:rgba(255,255,255,0.01);
      padding:10px;
      border-radius:8px;
      max-height:220px;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
    }

    /* high-duration row (use class instead of inline style) */
    .row-high{ background: linear-gradient(90deg, var(--danger-tint), transparent); }

    /* light theme: remove red tint from rows, keep duration text/color visible */
    [data-theme="light"] .row-high{ background: none; }
    [data-theme="light"] .duration-high{ color: var(--danger); background: rgba(255,107,107,0.06); }
    /* optionally soften duration bar highlight in light mode */
    [data-theme="light"] .duration-fill.high{ box-shadow:none; background: linear-gradient(90deg,#ffb6b6,#ff9a9a); }

    /* Mobile / narrow layout fixes */
    @media (max-width:900px){
      /* allow table to shrink and scroll horizontally instead of breaking layout */
      table{min-width:0}
      .table-wrap{overflow:auto}
      /* stack detail columns vertically for small screens */
      .details-content{flex-direction:column}
      .details-col{max-width:100%}
      .details-side{width:100%}
      /* make table cells wrap text */
      td{word-break:break-word}
      .details-pre{max-height:320px}
    }
  </style>
</head>
<body data-theme="dark">
  <header>
    <div class="title">
      <div>
        <h1>Dashboard Slow Endpoints</h1>
        <div class="subtitle">Memantau permintaan API yang lambat — tampilkan detail, salin token, dan filter cepat</div>
      </div>
    </div>

    <div class="controls">
      <div class="card" style="display:flex;gap:8px;align-items:center">
        <input id="q" type="search" placeholder="Cari path, filter atau token…" />
        <select id="methodFilter" title="Filter method">
          <option value="">All methods</option>
          <option>GET</option>
          <option>POST</option>
          <option>PUT</option>
          <option>DELETE</option>
        </select>
        <!-- single date picker (select one day). no weekday shown by code, browser shows localized date -->
        <input id="date" class="date-input" type="date" title="Tanggal" style="width:160px"/>
        <button id="refresh">Refresh</button>
        <button id="exportBtn" class="ghost" title="Export visible rows (CSV)">Export CSV</button>
        <!-- Theme toggle button -->
        <button id="themeToggle" class="ghost" title="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <main>
    <div class="left card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="muted">Source: <span id="apiUrl">https://visit-flow-auth.flexurio.com/file/slow-endpoints</span></div>
        <div class="muted" id="lastUpdated">—</div>
      </div>

      <div class="table-wrap card" style="margin-top:12px;padding:0;">
        <table id="table">
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Method</th>
              <th>Path</th>
              <th>Status</th>
              <th style="cursor:pointer" id="durationHeader">Duration ▲▼</th>
              <th>Filter</th>
              <th>Token</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="empty" class="muted" style="margin-top:12px">Memuat data…</div>
    </div>
  </main>

  <script>
    const API_URL = 'https://visit-flow-auth.flexurio.com/file/slow-endpoints';
    document.getElementById('apiUrl').textContent = API_URL;
    const tbody = document.querySelector('#table tbody');
    const empty = document.getElementById('empty');
    const lastUpdated = document.getElementById('lastUpdated');
    const refreshBtn = document.getElementById('refresh');
    const qInput = document.getElementById('q');
    const methodFilter = document.getElementById('methodFilter');
    const dateInput = document.getElementById('date'); // single day filter
    const exportBtn = document.getElementById('exportBtn');
    const durationHeader = document.getElementById('durationHeader');

    let dataList = [];
    let lastFiltered = [];
    let sortDesc = true;

    function parseDuration(d){
      if(!d) return 0;
      d=String(d).trim();
      if(d.endsWith('s')) return Math.round(parseFloat(d.slice(0,-1))*1000);
      if(d.endsWith('ms')) return Math.round(parseFloat(d.slice(0,-2)));
      const n = parseFloat(d);
      return Number.isFinite(n) ? Math.round(n) : 0;
    }

    function fmtDate(iso){
      try{
        const dt = new Date(iso);
        return dt.toLocaleString();
      }catch(e){ return iso }
    }

    function methodClass(m){
      if(!m) return '';
      return 'm-'+m;
    }

    function statusClass(s){
      if(!s) return '';
      if(s>=500) return 's-5xx';
      if(s>=400) return 's-4xx';
      return 's-2xx';
    }

    function truncate(t, n=36){ if(!t) return ''; return t.length>n ? t.slice(0,n-10)+'…'+t.slice(-8) : t }

    function clearDetails(){
      document.querySelectorAll('tr.details').forEach(r=>r.remove());
      document.querySelectorAll('tr.expanded').forEach(r=>r.classList.remove('expanded'));
    }

    function render(list){
      tbody.innerHTML='';
      if(!Array.isArray(list) || list.length===0){ empty.textContent='Tidak ada data slow endpoints.'; return; }
      empty.textContent='';

      // sort by timestamp (newest first)
      const sorted = [...list].sort((a, b) => {
        const ta = a && a.timestamp ? new Date(a.timestamp).getTime() : 0;
        const tb = b && b.timestamp ? new Date(b.timestamp).getTime() : 0;
        return tb - ta;
      });
      for(const item of sorted){
        const durMs = parseDuration(item.duration);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td title="${item.timestamp}">${fmtDate(item.timestamp)}</td>
          <td><span class="method-badge ${methodClass(item.method)}">${item.method||''}</span></td>
          <td><code class="path-code">${item.path||''}</code></td>
          <td><span class="status-chip ${statusClass(item.status)}">${item.status??''}</span></td>
          <td>
            ${(durMs/1000).toFixed(3)} s
            <div class="duration-bar" aria-hidden>
              <div class="duration-fill ${durMs >= 10000 ? 'high' : ''}" style="width:${Math.min(100, durMs/2000)}%"></div>
            </div>
            <div class="duration-value ${durMs >= 10000 ? 'duration-high' : ''}">${durMs} ms</div>
          </td>
          <td title="${item.filter||''}" class="muted" style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${truncate(item.filter||'')}</td>
          <td><span class="token" title="${item.token||''}">${truncate(item.token||'')}</span></td>
          <td class="actions">
            <button class="ghost" data-action="copy" title="Copy token">Copy</button>
            <button class="ghost" data-action="details" title="Toggle details">Details</button>
          </td>
        `;
        // highlight long requests
        if(durMs >= 10000) tr.classList.add('row-high');

        // attach handlers
        tr.addEventListener('click', (ev)=>{
          if(ev.target.closest('button')) return; // skip button clicks
          toggleDetails(tr, item);
        });

        tbody.appendChild(tr);

        // attach button handlers
        tr.querySelector('[data-action="copy"]').addEventListener('click', (e)=>{
          e.stopPropagation();
          navigator.clipboard.writeText(item.token || '').then(()=> {
            e.target.textContent = 'Copied';
            setTimeout(()=> e.target.textContent = 'Copy', 1200);
          }).catch(()=> { e.target.textContent = 'Fail'; setTimeout(()=> e.target.textContent = 'Copy', 1200); });
        });
        tr.querySelector('[data-action="details"]').addEventListener('click', (e)=>{
          e.stopPropagation();
          toggleDetails(tr, item);
        });
      }
    }

    function toggleDetails(tr, item){
      const already = tr.classList.contains('expanded');
      clearDetails();
      if(already) return;
      tr.classList.add('expanded');
      const details = document.createElement('tr');
      details.className='details';
      const td = document.createElement('td');
      td.colSpan = 8;
      td.innerHTML = `
        <div class="details-content">
          <div class="details-col">
            <div class="muted">Filter</div>
            <pre class="details-pre">${item.filter||'—'}</pre>
          </div>
          <div class="details-col">
            <div class="muted">Token</div>
            <pre class="details-pre" id="full-token">${item.token||'—'}</pre>
            <div style="margin-top:8px;display:flex;gap:8px">
              <button id="copyFullToken">Copy token</button>
              <button id="copyCurl" class="ghost">Copy curl</button>
            </div>
          </div>
          <div class="details-side">
            <div class="muted">Request info</div>
            <div style="margin-top:6px"><span class="pill">Method: ${item.method||''}</span></div>
            <div style="margin-top:6px"><span class="pill">Status: ${item.status||''}</span></div>
            <div style="margin-top:12px" class="muted">Timestamp</div>
            <div style="margin-top:6px">${fmtDate(item.timestamp)}</div>
          </div>
        </div>
      `;
      details.appendChild(td);
      tr.after(details);

      // copy token
      document.getElementById('copyFullToken').addEventListener('click', ()=>{
        navigator.clipboard.writeText(item.token||'').then(()=> {
          const btn = document.getElementById('copyFullToken');
          btn.textContent = 'Copied';
          setTimeout(()=> btn.textContent = 'Copy token', 1200);
        });
      });

      // copy curl (better formatted, responsive-friendly)
      document.getElementById('copyCurl').addEventListener('click', ()=>{
        try{
          const baseOrigin = (()=> {
            try { return new URL(API_URL).origin; } catch(e){ return window.location.origin; }
          })();
          const rawPath = item.path || '';
          const path = rawPath.startsWith('http') ? rawPath : (baseOrigin.replace(/\/$/,'') + rawPath);
          const method = (item.method || 'GET').toUpperCase();
          const token = item.token || '';
          const filter = item.filter || '';

          // for GET, append filter as query string if present
          const fullUrl = (method === 'GET' && filter)
            ? path + (path.includes('?') ? '&' : '?') + filter
            : path;

          // Escape single quotes in data payload
          const escapeSingle = s => s.replace(/'/g, `'\"'\"'`);

          let curlLines = [];
          curlLines.push(`curl -X ${method} '${fullUrl}' \\`);
          curlLines.push(`  -H 'Accept: application/json'`);
          if(token) curlLines.push(`  -H 'Authorization: Bearer ${token}'`);

          if(method !== 'GET' && filter) {
            // treat filter as x-www-form-urlencoded payload
            curlLines.push(`  -H 'Content-Type: application/x-www-form-urlencoded' \\`);
            curlLines.push(`  --data '${escapeSingle(filter)}'`);
          }

          curlLines.push(`  --compressed`);
          const curl = curlLines.join('\n');

          navigator.clipboard.writeText(curl).then(()=> {
            const btn = document.getElementById('copyCurl');
            btn.textContent = 'Copied';
            setTimeout(()=> btn.textContent = 'Copy curl', 1200);
          }).catch(()=>{
            const btn = document.getElementById('copyCurl');
            btn.textContent = 'Fail';
            setTimeout(()=> btn.textContent = 'Copy curl', 1200);
          });
        }catch(e){
          const btn = document.getElementById('copyCurl');
          btn.textContent = 'Fail';
          setTimeout(()=> btn.textContent = 'Copy curl', 1200);
        }
      });
    }

    function applyFilters(){
      const q = qInput.value.trim().toLowerCase();
      const method = methodFilter.value;
      // single-day filter: if a date is chosen, match items whose timestamp falls on that local day
      const selected = dateInput && dateInput.value ? new Date(dateInput.value) : null;
      const from = selected ? new Date(selected) : null;
      if(from) from.setHours(0,0,0,0);
      const to = selected ? new Date(selected) : null;
      if(to) to.setHours(23,59,59,999);

      const filtered = dataList.filter(it=>{
        if(method && (it.method||'') !== method) return false;
        if((from || to) && it.timestamp){
          const itDate = new Date(it.timestamp);
          if(from && itDate < from) return false;
          if(to && itDate > to) return false;
        }
        if(!q) return true;
        const hay = [it.path, it.filter, it.token, it.method, String(it.status)].join(' ').toLowerCase();
        return hay.includes(q);
      });

      // If no filters are applied, limit to 10 latest results.
      // When any filter/search/date/method is used, show all matching rows.
      const hasFilter = Boolean(q || method || selected);
      lastFiltered = hasFilter ? filtered : filtered.slice(0, 10);
      render(lastFiltered);
    }

    let debounceTimer = null;
    [qInput, methodFilter, dateInput].forEach(el=>{
      if(!el) return;
      el.addEventListener('input', ()=> {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFilters, 220);
      });
    });

    async function load(){
      try{
        refreshBtn.disabled = true;
        refreshBtn.textContent = 'Memuat…';
        const res = await fetch(API_URL);
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if(!json||!Array.isArray(json.data)){ empty.textContent='Response tidak sesuai.'; return; }
        dataList = json.data;
        applyFilters();
        lastUpdated.textContent = 'Terakhir: ' + new Date().toLocaleTimeString();
      }catch(err){
        empty.textContent = 'Gagal memuat: ' + (err.message || err);
      }finally{
        refreshBtn.disabled = false;
        refreshBtn.textContent = 'Refresh';
      }
    }

    refreshBtn.addEventListener('click', load);
    exportBtn.addEventListener('click', ()=>{
      if(!lastFiltered || lastFiltered.length === 0){
        exportBtn.textContent = 'No data';
        setTimeout(()=> exportBtn.textContent = 'Export CSV', 1200);
        return;
      }
      const rows = lastFiltered.map(it => {
        const dur = parseDuration(it.duration);
        // escape double quotes by doubling them
        const esc = s => `"${String(s ?? '').replace(/"/g, '""')}"`;
        return [
          esc(it.timestamp),
          esc(it.method),
          esc(it.path),
          esc(it.status),
          esc(dur),
          esc(it.filter),
          esc(it.token)
        ].join(',');
      });
      const header = ['timestamp','method','path','status','duration_ms','filter','token'].join(',');
      const csv = [header, ...rows].join('\n');
      const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'slow-endpoints.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      exportBtn.textContent = 'Exported';
      setTimeout(()=> exportBtn.textContent = 'Export CSV', 1500);
    });

    durationHeader.addEventListener('click', ()=> {
      sortDesc = !sortDesc;
      applyFilters();
    });

    // Theme (light / dark) ----------------------------------------------
    const themeToggle = document.getElementById('themeToggle');
    const THEME_KEY = 'slowendpoints_theme';

    function applyTheme(theme){
      const root = document.documentElement;
      if(theme === 'light') {
        root.setAttribute('data-theme', 'light');
        document.body.setAttribute('data-theme','light');
        themeToggle.textContent = '☀️';
        themeToggle.title = 'Light mode';
      } else {
        root.setAttribute('data-theme', 'dark');
        document.body.setAttribute('data-theme','dark');
        themeToggle.textContent = '🌙';
        themeToggle.title = 'Dark mode';
      }
      try { localStorage.setItem(THEME_KEY, theme); } catch(e){}
    }

    function detectInitialTheme(){
      try{
        const stored = localStorage.getItem(THEME_KEY);
        if(stored) return stored;
      }catch(e){}
      // use prefers-color-scheme
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    themeToggle.addEventListener('click', ()=>{
      const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      applyTheme(current === 'light' ? 'dark' : 'light');
    });

    // apply initial theme
    applyTheme(detectInitialTheme());

    // initial load
    load();
  </script>
</body>
</html>
